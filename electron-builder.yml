appId: com.cw-ksh.app
productName: 丰驰信息化平台
copyright: Copyright © 2026 cw-ksh

win:
  target: nsis
  # icon: public/favicon.svg

mac:
  target: dmg
  # icon: public/favicon.svg

linux:
  target: AppImage
  # icon: public/favicon.svg

files:
  - build/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: public
    to: public

buildDependenciesFromSource: true

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
